services:
  qdrant:
    image: docker.io/qdrant/qdrant:latest
    container_name: secure-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage:Z

  rag-app:
    image: docker.io/library/python:3.11-slim
    container_name: secure-rag-app
    volumes:
      - .:/app:Z
    working_dir: /app
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    command: >
      sh -c "pip install openai qdrant-client sentence-transformers && python app.py"
    network_mode: "host"
    depends_on:
      - qdrant

volumes:
  qdrant_data:

